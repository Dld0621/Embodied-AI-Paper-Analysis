<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Embodied AI Paper Analysis - 论文索引</title>
<meta name="description" content="Embodied AI 领域 1099+ 篇论文索引，7 大方向 20 个子方向，支持搜索与筛选">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--bg2:#f5f7fa;--bg3:#e8ecf1;--text:#1a1a2e;--text2:#4a5568;--border:#e2e8f0;--accent:#4f46e5;--accent2:#6366f1;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow2:0 4px 12px rgba(0,0,0,.06);--radius:8px;--radius2:12px}
[data-theme="dark"]{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#e2e8f0;--text2:#94a3b8;--border:#334155;--accent:#818cf8;--accent2:#a5b4fc;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow2:0 4px 12px rgba(0,0,0,.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;line-height:1.6}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent2)}

.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);transition:all .3s}
.header-inner{max-width:1400px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:1.3rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo svg{width:24px;height:24px}
.search-box{flex:1;min-width:200px;max-width:500px;position:relative}
.search-box input{width:100%;padding:8px 14px 8px 38px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:.9rem;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}
.header-actions{display:flex;align-items:center;gap:8px}
.btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:.85rem;transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.theme-toggle{padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);cursor:pointer;color:var(--text);font-size:1.1rem;line-height:1;display:flex;align-items:center}

/* Stats overview */
.overview{max-width:1400px;margin:20px auto 0;padding:0 24px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;text-align:center;transition:all .2s}
.stat-card:hover{border-color:var(--accent)}
.stat-num{font-size:1.8rem;font-weight:800;color:var(--accent)}
.stat-label{font-size:.78rem;color:var(--text2);margin-top:2px}

/* Direction map */
.dir-map{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;margin-bottom:16px}
.dir-map-title{font-size:1rem;font-weight:700;margin-bottom:16px;color:var(--text)}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
.dir-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;border-left:4px solid var(--dir-color,var(--accent))}
.dir-card:hover{box-shadow:var(--shadow2);transform:translateY(-1px)}
.dir-card.active{border-color:var(--accent);background:var(--accent);background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 8%,var(--bg)),var(--bg))}
.dir-name{font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:8px}
.dir-name .count{font-size:.72rem;padding:2px 8px;border-radius:10px;background:var(--accent);color:#fff;font-weight:600}
.dir-cn{font-size:.78rem;color:var(--text2);margin-top:2px}
.dir-desc{font-size:.72rem;color:var(--text2);margin-top:4px;line-height:1.4}
.dir-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.dir-tag{font-size:.68rem;padding:1px 7px;border-radius:8px;background:var(--bg3);color:var(--text2)}

/* Charts */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px}
.chart-title{font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--text)}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:150px;padding-top:8px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
.bar{width:100%;max-width:40px;border-radius:3px 3px 0 0;background:linear-gradient(to top,var(--accent),var(--accent2));transition:all .3s;position:relative;min-height:2px;cursor:pointer}
.bar:hover{opacity:.85;filter:brightness(1.1)}
.bar-label{font-size:.65rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bar-count{font-size:.65rem;font-weight:600;color:var(--text);opacity:0;transition:opacity .2s;position:absolute;top:-18px;left:50%;transform:translateX(-50%);white-space:nowrap;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:1px 5px}
.bar:hover .bar-count{opacity:1}

/* Topic breakdown */
.topic-breakdown{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;margin-bottom:16px}
.topic-breakdown-title{font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--text)}
.topic-bars{display:flex;flex-direction:column;gap:6px}
.topic-row{display:flex;align-items:center;gap:8px}
.topic-name{font-size:.78rem;color:var(--text);min-width:120px;white-space:nowrap}
.topic-bar-bg{flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative}
.topic-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s;min-width:2px}
.topic-count{font-size:.72rem;color:var(--text2);min-width:30px;text-align:right;font-weight:600}

/* Filters */
.filters{max-width:1400px;margin:16px auto 0;padding:0 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-label{font-size:.85rem;font-weight:600;color:var(--text2);white-space:nowrap}
.filter-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:.8rem;transition:all .2s;white-space:nowrap}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.result-count{font-size:.85rem;color:var(--text2);margin-left:auto;white-space:nowrap}

/* Paper list */
.paper-list{max-width:1400px;margin:16px auto 40px;padding:0 24px}
.paper-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:8px;transition:all .2s;display:flex;gap:14px;align-items:flex-start}
.paper-card:hover{border-color:var(--accent);box-shadow:var(--shadow2)}
.paper-index{font-size:.75rem;color:var(--text2);min-width:28px;text-align:right;padding-top:3px;font-weight:500}
.paper-body{flex:1;min-width:0}
.paper-title{font-size:.95rem;font-weight:600;color:var(--text);line-height:1.4;word-break:break-word}
.paper-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;align-items:center}
.paper-tag{font-size:.72rem;padding:2px 8px;border-radius:12px;font-weight:500}
.tag-topic{background:var(--accent);color:#fff;opacity:.85}
.tag-year{background:var(--bg3);color:var(--text)}
.tag-venue{background:#fef3c7;color:#92400e;border:1px solid #fbbf24}
[data-theme="dark"] .tag-venue{background:#422006;color:#fbbf24;border-color:#92400e}
.paper-links{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;flex-shrink:0}
.paper-link{font-size:.78rem;padding:3px 10px;border-radius:var(--radius);border:1px solid var(--border);color:var(--text2);transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.paper-link:hover{border-color:var(--accent);color:var(--accent)}
.paper-link.arxiv{border-color:#b91c1c33;color:#b91c1c}
.paper-link.arxiv:hover{background:#b91c1c11}
.paper-link.scholar{border-color:#4285f433;color:#4285f4}
.paper-link.scholar:hover{background:#4285f411}
.paper-link.code{border-color:#05966933;color:#059669}
.paper-link.code:hover{background:#05966911}

.pagination{max-width:1400px;margin:0 auto 40px;padding:0 24px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.page-btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:.85rem;transition:all .2s}
.page-btn:hover{border-color:var(--accent)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

.no-results{text-align:center;padding:60px 20px;color:var(--text2)}
.no-results svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.no-results p{font-size:.95rem}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

@media(max-width:768px){
.header-inner{padding:10px 14px;gap:10px}
.logo{font-size:1.1rem}
.search-box{min-width:140px;order:3;flex-basis:100%}
.stats-row{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.stat-num{font-size:1.4rem}
.dir-grid{grid-template-columns:1fr}
.charts-row{grid-template-columns:1fr}
.overview{padding:0 14px}
.filters{padding:0 14px;gap:8px}
.paper-list{padding:0 14px}
.paper-card{flex-direction:column;gap:8px;padding:12px 14px}
.paper-index{display:none}
.paper-links{margin-left:0;margin-top:4px}
}
@media(max-width:480px){
.header-actions .btn-text{display:none}
.filter-chip{font-size:.72rem;padding:3px 8px}
}
</style>
</head>

(function(){
let currentDir='全部',currentTopic='全部',currentYear='全部',searchQuery='',sortMode='year-desc',page=1;
const PAGE_SIZE=50;

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* Data helpers */
function getL1(p){return p[7]||'Others'}
function getDirs(){const s=new Set();P.forEach(p=>s.add(getL1(p)));return [...s]}
function getTopicsForDir(dir){
  if(dir==='全部')return[...new Set(P.map(p=>p[1]))].filter(t=>t);
  return[...new Set(P.filter(p=>getL1(p)===dir).map(p=>p[1]))].filter(t=>t);
}
function getYears(){
  const s=new Set();P.forEach(p=>{if(p[2])s.add(p[2])});
  return [...s].sort((a,b)=>b.localeCompare(a));
}
function getFiltered(){
  return P.filter(p=>{
    const md=!currentDir||currentDir==='全部'||getL1(p)===currentDir;
    const mt=!currentTopic||currentTopic==='全部'||p[1]===currentTopic;
    const my=!currentYear||currentYear==='全部'||p[2]===currentYear;
    const ms=!searchQuery||p[0].toLowerCase().includes(searchQuery.toLowerCase());
    return md&&mt&&my&&ms;
  });
}
function getSorted(arr){
  const s=[...arr];
  if(sortMode==='year-desc')s.sort((a,b)=>(b[2]||'').localeCompare(a[2]||''));
  else if(sortMode==='year-asc')s.sort((a,b)=>(a[2]||'').localeCompare(b[2]||''));
  else if(sortMode==='title-asc')s.sort((a,b)=>a[0].localeCompare(b[0]));
  else if(sortMode==='title-desc')s.sort((a,b)=>b[0].localeCompare(a[0]));
  return s;
}

/* Render overview */
function renderOverview(){
  const filtered=getFiltered();
  const all=P.length;
  const cats=P.filter(p=>p[7]&&p[7]!=='Others').length;
  const arxiv=P.filter(p=>p[3]&&p[3].includes('arxiv')).length;
  const code=P.filter(p=>p[5]).length;
  const years=new Set(P.map(p=>p[2]).filter(Boolean)).size;
  const dirs=getDirs().filter(d=>d!=='Others').length;

  let h='<div class="stats-row">';
  h+=sc(all,'总论文数')+sc(cats,'已分类')+sc(dirs,'研究方向')+sc(years,'年份跨度')+sc(arxiv,'arXiv 链接')+sc(code,'代码开源');
  h+='</div>';

  /* Direction map */
  h+='<div class="dir-map"><div class="dir-map-title">研究方向导航</div><div class="dir-grid">';
  L1.forEach(d=>{
    const cnt=P.filter(p=>getL1(p)===d[0]).length;
    const topics=getTopicsForDir(d[0]);
    const active=currentDir===d[0]?' active':'';
    h+='<div class="dir-card'+active+'" style="--dir-color:'+d[3]+'" data-dir="'+d[0]+'">';
    h+='<div class="dir-name">'+d[0]+' <span class="count">'+cnt+'</span></div>';
    h+='<div class="dir-cn">'+d[1]+'</div>';
    h+='<div class="dir-desc">'+d[2]+'</div>';
    h+='<div class="dir-tags">';
    topics.forEach(t=>{
      const tc=P.filter(p=>getL1(p)===d[0]&&p[1]===t).length;
      h+='<span class="dir-tag">'+t+' '+tc+'</span>';
    });
    h+='</div></div>';
  });
  h+='</div></div>';

  /* Charts row */
  h+='<div class="charts-row">';
  /* Year chart */
  const yearMap={};
  P.forEach(p=>{if(p[2])yearMap[p[2]]=(yearMap[p[2]]||0)+1});
  const yrs=Object.keys(yearMap).sort();
  const yMax=Math.max(...Object.values(yearMap),1);
  h+='<div class="chart-card"><div class="chart-title">年份分布</div><div class="bar-chart" id="yearChart"></div></div>';
  /* Direction chart */
  h+='<div class="chart-card"><div class="chart-title">方向分布</div><div class="bar-chart" id="dirChart"></div></div>';
  h+='</div>';

  /* Topic breakdown for current direction */
  h+='<div class="topic-breakdown" id="topicBreakdown"></div>';

  document.getElementById('overview').innerHTML=h;

  /* Draw year chart */
  let yh='';
  yrs.forEach(y=>{
    const c=yearMap[y];
    const bH=Math.max(2,c/yMax*140);
    yh+='<div class="bar-group" data-year="'+y+'"><div class="bar" style="height:'+bH+'px"><span class="bar-count">'+c+'</span></div><span class="bar-label">'+y+'</span></div>';
  });
  document.getElementById('yearChart').innerHTML=yh;
  document.querySelectorAll('#yearChart .bar-group').forEach(el=>{
    el.addEventListener('click',function(){currentYear=currentYear===this.dataset.year?'全部':this.dataset.year;page=1;renderAll()});
  });

  /* Draw direction chart */
  const dCounts={};
  L1.forEach(d=>{dCounts[d[0]]=P.filter(p=>getL1(p)===d[0]).length});
  const dMax=Math.max(...Object.values(dCounts),1);
  let dh='';
  L1.forEach(d=>{
    const c=dCounts[d[0]];
    const bH=Math.max(2,c/dMax*140);
    dh+='<div class="bar-group" data-dir="'+d[0]+'"><div class="bar" style="height:'+bH+'px;background:linear-gradient(to top,'+d[3]+','+d[3]+'cc)"><span class="bar-count">'+c+'</span></div><span class="bar-label">'+d[1]+'</span></div>';
  });
  document.getElementById('dirChart').innerHTML=dh;
  document.querySelectorAll('#dirChart .bar-group').forEach(el=>{
    el.addEventListener('click',function(){currentDir=currentDir===this.dataset.dir?'全部':this.dataset.dir;currentTopic='全部';page=1;renderAll()});
  });

  /* Direction card clicks */
  document.querySelectorAll('.dir-card').forEach(el=>{
    el.addEventListener('click',function(){
      const d=this.dataset.dir;
      currentDir=currentDir===d?'全部':d;
      currentTopic='全部';page=1;renderAll();
    });
  });

  /* Topic breakdown */
  renderTopicBreakdown();
}

function renderTopicBreakdown(){
  const dir=currentDir==='全部'?null:currentDir;
  let papers=dir?P.filter(p=>getL1(p)===dir):P;
  const tMap={};
  papers.forEach(p=>{if(p[1])tMap[p[1]]=(tMap[p[1]]||0)+1});
  const sorted=Object.entries(tMap).sort((a,b)=>b[1]-a[1]);
  const tMax=Math.max(...sorted.map(s=>s[1]),1);
  if(!sorted.length){document.getElementById('topicBreakdown').innerHTML='';return}
  const dirName=dir?L1.find(d=>d[0]===dir):null;
  let h='<div class="topic-breakdown-title">'+(dirName?dirName[1]:'全部方向')+' — 子方向分布</div><div class="topic-bars">';
  sorted.forEach(([t,c])=>{
    const pct=Math.round(c/tMax*100);
    h+='<div class="topic-row"><span class="topic-name">'+t+'</span><div class="topic-bar-bg"><div class="topic-bar-fill" style="width:'+pct+'%"></div></div><span class="topic-count">'+c+'</span></div>';
  });
  h+='</div>';
  document.getElementById('topicBreakdown').innerHTML=h;
}

function sc(n,l){return '<div class="stat-card"><div class="stat-num">'+n+'</div><div class="stat-label">'+l+'</div></div>'}

/* Render filters */
function renderFilters(){
  const topics=currentDir!=='全部'?getTopicsForDir(currentDir):[...new Set(P.map(p=>p[1]))].filter(Boolean);
  const years=getYears();
  const filtered=getFiltered();
  let h='<div class="filter-group"><span class="filter-label">方向:</span>';
  h+='<span class="filter-chip'+(currentDir==='全部'?' active':'')+'" data-dir="全部">全部</span>';
  L1.forEach(d=>{
    h+='<span class="filter-chip'+(currentDir===d[0]?' active':'')+'" data-dir="'+d[0]+'">'+d[1]+'</span>';
  });
  h+='</div>';
  if(currentDir!=='全部'){
    h+='<div class="filter-group"><span class="filter-label">子方向:</span>';
    h+='<span class="filter-chip'+(currentTopic==='全部'?' active':'')+'" data-topic="全部">全部</span>';
    topics.forEach(t=>{
      const c=P.filter(p=>p[1]===t&&(currentDir==='全部'||getL1(p)===currentDir)).length;
      h+='<span class="filter-chip'+(currentTopic===t?' active':'')+'" data-topic="'+t+'">'+t+' ('+c+')</span>';
    });
    h+='</div>';
  }
  h+='<div class="filter-group"><span class="filter-label">年份:</span>';
  h+='<span class="filter-chip'+(currentYear==='全部'?' active':'')+'" data-year="全部">全部</span>';
  years.forEach(y=>{h+='<span class="filter-chip'+(currentYear===y?' active':'')+'" data-year="'+y+'">'+y+'</span>'});
  h+='</div>';
  h+='<span class="result-count">显示 '+filtered.length+' / '+P.length+' 篇</span>';
  document.getElementById('filters').innerHTML=h;
  document.querySelectorAll('[data-dir]').forEach(el=>{el.addEventListener('click',function(){currentDir=this.dataset.dir;currentTopic='全部';page=1;renderAll()})});
  document.querySelectorAll('[data-topic]').forEach(el=>{el.addEventListener('click',function(){currentTopic=this.dataset.topic;page=1;renderAll()})});
  document.querySelectorAll('[data-year]').forEach(el=>{el.addEventListener('click',function(){currentYear=this.dataset.year;page=1;renderAll()})});
}

/* Render paper list */
function renderPapers(){
  const filtered=getSorted(getFiltered());
  const total=filtered.length;
  const totalPages=Math.ceil(total/PAGE_SIZE)||1;
  if(page>totalPages)page=totalPages;
  const start=(page-1)*PAGE_SIZE;
  const end=Math.min(start+PAGE_SIZE,total);
  const slice=filtered.slice(start,end);
  if(!slice.length){
    document.getElementById('paperList').innerHTML='<div class="no-results"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>没有找到匹配的论文</p></div>';
    return;
  }
  let h='';
  slice.forEach((p,i)=>{
    const idx=start+i+1;
    const title=p[0],topic=p[1],year=p[2],arxiv=p[3],scholar=p[4],code=p[5],venue=p[6];
    h+='<div class="paper-card">';
    h+='<span class="paper-index">'+idx+'</span>';
    h+='<div class="paper-body">';
    h+='<div class="paper-title">'+esc(title)+'</div>';
    h+='<div class="paper-meta">';
    h+='<span class="paper-tag tag-topic">'+esc(topic)+'</span>';
    h+='<span class="paper-tag tag-year">'+esc(year)+'</span>';
    if(venue)h+='<span class="paper-tag tag-venue">'+esc(venue)+'</span>';
    h+='</div></div>';
    h+='<div class="paper-links">';
    if(arxiv)h+='<a class="paper-link arxiv" href="'+arxiv+'" target="_blank" rel="noopener">arXiv</a>';
    if(scholar)h+='<a class="paper-link scholar" href="'+scholar+'" target="_blank" rel="noopener">Scholar</a>';
    if(code)h+='<a class="paper-link code" href="'+code+'" target="_blank" rel="noopener">Code</a>';
    h+='</div></div>';
  });
  document.getElementById('paperList').innerHTML=h;
  renderPagination(totalPages);
}

/* Pagination */
function renderPagination(totalPages){
  if(totalPages<=1){document.getElementById('pagination').innerHTML='';return}
  let h='<button class="page-btn"'+(page<=1?' disabled':'')+' data-page="prev">上一页</button>';
  const maxS=7;
  let s=Math.max(1,page-Math.floor(maxS/2));
  let e=Math.min(totalPages,s+maxS-1);
  if(e-s<maxS-1)s=Math.max(1,e-maxS+1);
  if(s>1)h+='<button class="page-btn" data-page="1">1</button>';
  if(s>2)h+='<span class="page-btn" style="border:none;cursor:default">...</span>';
  for(let i=s;i<=e;i++)h+='<button class="page-btn'+(i===page?' active':'')+'" data-page="'+i+'">'+i+'</button>';
  if(e<totalPages-1)h+='<span class="page-btn" style="border:none;cursor:default">...</span>';
  if(e<totalPages)h+='<button class="page-btn" data-page="'+totalPages+'">'+totalPages+'</button>';
  h+='<button class="page-btn"'+(page>=totalPages?' disabled':'')+' data-page="next">下一页</button>';
  document.getElementById('pagination').innerHTML=h;
  document.querySelectorAll('[data-page]').forEach(el=>{
    el.addEventListener('click',function(){
      const v=this.dataset.page;
      if(v==='prev')page=Math.max(1,page-1);
      else if(v==='next')page=Math.min(totalPages,page+1);
      else page=parseInt(v);
      renderPapers();
      window.scrollTo({top:document.querySelector('.filters').offsetTop-60,behavior:'smooth'});
    });
  });
}

function renderAll(){renderOverview();renderFilters();renderPapers()}

/* Search */
let sT;
document.getElementById('searchInput').addEventListener('input',function(){clearTimeout(sT);sT=setTimeout(()=>{searchQuery=this.value;page=1;renderAll()},200)});

/* Sort */
const sM=[{key:'year-desc',label:'按年份 ↓'},{key:'year-asc',label:'按年份 ↑'},{key:'title-asc',label:'按标题 A-Z'},{key:'title-desc',label:'按标题 Z-A'}];
document.getElementById('sortBtn').addEventListener('click',function(){const i=sM.findIndex(s=>s.key===sortMode);sortMode=sM[(i+1)%sM.length].key;this.textContent=sM[(i+1)%sM.length].label;page=1;renderPapers()});

/* Theme */
const sv=localStorage.getItem('theme');
if(sv){document.documentElement.dataset.theme=sv;document.getElementById('themeToggle').textContent=sv==='dark'?'🌙':'☀'}
document.getElementById('themeToggle').addEventListener('click',function(){const n=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=n;this.textContent=n==='dark'?'🌙':'☀';localStorage.setItem('theme',n)});

renderAll();
})();
