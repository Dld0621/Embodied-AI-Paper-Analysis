<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Embodied AI Paper Analysis - 论文索引</title>
<meta name="description" content="Embodied AI 领域论文索引，按主题和年份分类，支持搜索与筛选">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--bg2:#f5f7fa;--bg3:#e8ecf1;--text:#1a1a2e;--text2:#4a5568;--border:#e2e8f0;--accent:#4f46e5;--accent2:#6366f1;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow2:0 4px 12px rgba(0,0,0,.06);--radius:8px;--radius2:12px}
[data-theme="dark"]{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#e2e8f0;--text2:#94a3b8;--border:#334155;--accent:#818cf8;--accent2:#a5b4fc;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow2:0 4px 12px rgba(0,0,0,.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;line-height:1.6}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent2)}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);transition:all .3s}
.header-inner{max-width:1400px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:1.3rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo svg{width:24px;height:24px}
.search-box{flex:1;min-width:200px;max-width:500px;position:relative}
.search-box input{width:100%;padding:8px 14px 8px 38px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:.9rem;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}
.header-actions{display:flex;align-items:center;gap:8px}
.btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:.85rem;transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.theme-toggle{padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);cursor:pointer;color:var(--text);font-size:1.1rem;line-height:1;display:flex;align-items:center}

/* Stats bar */
.stats-bar{max-width:1400px;margin:20px auto 0;padding:0 24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;text-align:center}
.stat-num{font-size:2rem;font-weight:800;color:var(--accent)}
.stat-label{font-size:.8rem;color:var(--text2);margin-top:2px}

/* Chart */
.chart-section{max-width:1400px;margin:20px auto 0;padding:0 24px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px}
.chart-title{font-size:1rem;font-weight:600;margin-bottom:16px;color:var(--text)}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:180px;padding-top:10px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0}
.bar{width:100%;max-width:50px;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--accent),var(--accent2));transition:all .3s;position:relative;min-height:2px;cursor:pointer}
.bar:hover{opacity:.85;filter:brightness(1.1)}
.bar-label{font-size:.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-count{font-size:.7rem;font-weight:600;color:var(--text);opacity:0;transition:opacity .2s;position:absolute;top:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px}
.bar:hover .bar-count{opacity:1}

/* Filters */
.filters{max-width:1400px;margin:20px auto 0;padding:0 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-label{font-size:.85rem;font-weight:600;color:var(--text2);white-space:nowrap}
.filter-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:.8rem;transition:all .2s;white-space:nowrap}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.result-count{font-size:.85rem;color:var(--text2);margin-left:auto;white-space:nowrap}

/* Paper list */
.paper-list{max-width:1400px;margin:16px auto 40px;padding:0 24px}
.paper-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:8px;transition:all .2s;display:flex;gap:14px;align-items:flex-start}
.paper-card:hover{border-color:var(--accent);box-shadow:var(--shadow2)}
.paper-index{font-size:.75rem;color:var(--text2);min-width:28px;text-align:right;padding-top:3px;font-weight:500}
.paper-body{flex:1;min-width:0}
.paper-title{font-size:.95rem;font-weight:600;color:var(--text);line-height:1.4;word-break:break-word}
.paper-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;align-items:center}
.paper-tag{font-size:.72rem;padding:2px 8px;border-radius:12px;font-weight:500}
.tag-topic{background:var(--accent);color:#fff;opacity:.85}
.tag-year{background:var(--bg3);color:var(--text)}
.paper-links{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;flex-shrink:0}
.paper-link{font-size:.78rem;padding:3px 10px;border-radius:var(--radius);border:1px solid var(--border);color:var(--text2);transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.paper-link:hover{border-color:var(--accent);color:var(--accent)}
.paper-link.arxiv{border-color:#b91c1c33;color:#b91c1c}
.paper-link.arxiv:hover{background:#b91c1c11}
.paper-link.scholar{border-color:#4285f433;color:#4285f4}
.paper-link.scholar:hover{background:#4285f411}
.paper-link.code{border-color:#05966933;color:#059669}
.paper-link.code:hover{background:#05966911}

/* Pagination */
.pagination{max-width:1400px;margin:0 auto 40px;padding:0 24px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.page-btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:.85rem;transition:all .2s}
.page-btn:hover{border-color:var(--accent)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

/* No results */
.no-results{text-align:center;padding:60px 20px;color:var(--text2)}
.no-results svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.no-results p{font-size:.95rem}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* Responsive */
@media(max-width:768px){
.header-inner{padding:10px 14px;gap:10px}
.logo{font-size:1.1rem}
.search-box{min-width:140px;order:3;flex-basis:100%}
.stats-grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.stat-num{font-size:1.5rem}
.bar-chart{height:120px;gap:4px}
.bar{max-width:30px}
.filters{padding:0 14px;gap:8px}
.paper-list{padding:0 14px}
.paper-card{flex-direction:column;gap:8px;padding:12px 14px}
.paper-index{display:none}
.paper-links{margin-left:0;margin-top:4px}
.chart-section,.stats-bar{padding:0 14px}
}
@media(max-width:480px){
.header-actions .btn-text{display:none}
.bar-label{font-size:.6rem}
.filter-chip{font-size:.72rem;padding:3px 8px}
}
</style>
</head>

(function(){
/* State */
let currentTopic='全部',currentYear='全部',searchQuery='',sortMode='year-desc',page=1;
const PAGE_SIZE=50;

/* Derived data */
function getTopics(){
const s=new Set();
P.forEach(p=>s.add(p[1]));
return [...s].sort();
}
function getYears(){
const s=new Set();
P.forEach(p=>s.add(p[2]));
return [...s].sort((a,b)=>b.localeCompare(a));
}
function getFiltered(){
return P.filter(p=>{
const matchTopic=currentTopic==='全部'||p[1]===currentTopic;
const matchYear=currentYear==='全部'||p[2]===currentYear;
const matchSearch=!searchQuery||p[0].toLowerCase().includes(searchQuery.toLowerCase());
return matchTopic&&matchYear&&matchSearch;
});
}
function getSorted(arr){
const sorted=[...arr];
if(sortMode==='year-desc')sorted.sort((a,b)=>b[2].localeCompare(a[2]));
else if(sortMode==='year-asc')sorted.sort((a,b)=>a[2].localeCompare(b[2]));
else if(sortMode==='title-asc')sorted.sort((a,b)=>a[0].localeCompare(b[0]));
else if(sortMode==='title-desc')sorted.sort((a,b)=>b[0].localeCompare(a[0]));
return sorted;
}

/* Render stats */
function renderStats(){
const filtered=getFiltered();
const topics=new Set(P.map(p=>p[1])).size;
const years=new Set(P.map(p=>p[2])).size;
const arxivCount=P.filter(p=>p[3]).length;
const codeCount=P.filter(p=>p[5]).length;
document.getElementById('statsGrid').innerHTML=
statCard(filtered.length,'匹配论文')+
statCard(P.length,'总论文数')+
statCard(topics,'主题分类')+
statCard(years,'年份跨度')+
statCard(arxivCount,'arXiv 链接')+
statCard(codeCount,'代码链接');
}
function statCard(n,label){return '<div class="stat-card"><div class="stat-num">'+n+'</div><div class="stat-label">'+label+'</div></div>'}

/* Render chart */
function renderChart(){
const filtered=getFiltered();
const yearMap={};
filtered.forEach(p=>{yearMap[p[2]]=(yearMap[p[2]]||0)+1});
const years=Object.keys(yearMap).sort();
if(!years.length){document.getElementById('barChart').innerHTML='';return}
const max=Math.max(...Object.values(yearMap));
const h=160;
let html='';
years.forEach(y=>{
const count=yearMap[y];
const barH=Math.max(2,count/max*h);
html+='<div class="bar-group" data-year="'+y+'"><div class="bar" style="height:'+barH+'px"><span class="bar-count">'+count+'</span></div><span class="bar-label">'+y+'</span></div>';
});
document.getElementById('barChart').innerHTML=html;
document.querySelectorAll('.bar-group').forEach(el=>{
el.addEventListener('click',function(){
const y=this.dataset.year;
currentYear=currentYear===y?'全部':y;
page=1;renderAll();
});
});
}

/* Render filters */
function renderFilters(){
const topics=getTopics();
const years=getYears();
const filtered=getFiltered();
let html='<div class="filter-group"><span class="filter-label">主题:</span>';
html+='<span class="filter-chip'+(currentTopic==='全部'?' active':'')+'" data-topic="全部">全部</span>';
topics.forEach(t=>{
html+='<span class="filter-chip'+(currentTopic===t?' active':'')+'" data-topic="'+t+'">'+t+' ('+P.filter(p=>p[1]===t).length+')</span>';
});
html+='</div>';
html+='<div class="filter-group"><span class="filter-label">年份:</span>';
html+='<span class="filter-chip'+(currentYear==='全部'?' active':'')+'" data-year="全部">全部</span>';
years.forEach(y=>{
html+='<span class="filter-chip'+(currentYear===y?' active':'')+'" data-year="'+y+'">'+y+'</span>';
});
html+='</div>';
html+='<span class="result-count">显示 '+filtered.length+' / '+P.length+' 篇</span>';
document.getElementById('filters').innerHTML=html;
document.querySelectorAll('[data-topic]').forEach(el=>{
el.addEventListener('click',function(){currentTopic=this.dataset.topic;page=1;renderAll()});
});
document.querySelectorAll('[data-year]').forEach(el=>{
el.addEventListener('click',function(){currentYear=this.dataset.year;page=1;renderAll()});
});
}

/* Render paper list */
function renderPapers(){
const filtered=getSorted(getFiltered());
const total=filtered.length;
const totalPages=Math.ceil(total/PAGE_SIZE)||1;
if(page>totalPages)page=totalPages;
const start=(page-1)*PAGE_SIZE;
const end=Math.min(start+PAGE_SIZE,total);
const slice=filtered.slice(start,end);
if(!slice.length){
document.getElementById('paperList').innerHTML='<div class="no-results"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>没有找到匹配的论文</p></div>';
return;
}
let html='';
slice.forEach((p,i)=>{
const idx=start+i+1;
const title=p[0],topic=p[1],year=p[2],arxiv=p[3],scholar=p[4],code=p[5];
html+='<div class="paper-card">';
html+='<span class="paper-index">'+idx+'</span>';
html+='<div class="paper-body">';
html+='<div class="paper-title">'+escHtml(title)+'</div>';
html+='<div class="paper-meta">';
html+='<span class="paper-tag tag-topic">'+escHtml(topic)+'</span>';
html+='<span class="paper-tag tag-year">'+escHtml(year)+'</span>';
html+='</div></div>';
html+='<div class="paper-links">';
if(arxiv)html+='<a class="paper-link arxiv" href="'+arxiv+'" target="_blank" rel="noopener">arXiv</a>';
if(scholar)html+='<a class="paper-link scholar" href="'+scholar+'" target="_blank" rel="noopener">Scholar</a>';
if(code)html+='<a class="paper-link code" href="'+code+'" target="_blank" rel="noopener">Code</a>';
html+='</div></div>';
});
document.getElementById('paperList').innerHTML=html;
renderPagination(totalPages);
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* Pagination */
function renderPagination(totalPages){
if(totalPages<=1){document.getElementById('pagination').innerHTML='';return}
let html='';
html+='<button class="page-btn"'+(page<=1?' disabled':'')+' data-page="prev">上一页</button>';
const maxShow=7;
let startP=Math.max(1,page-Math.floor(maxShow/2));
let endP=Math.min(totalPages,startP+maxShow-1);
if(endP-startP<maxShow-1)startP=Math.max(1,endP-maxShow+1);
if(startP>1)html+='<button class="page-btn" data-page="1">1</button>';
if(startP>2)html+='<span class="page-btn" style="border:none;cursor:default">...</span>';
for(let i=startP;i<=endP;i++){
html+='<button class="page-btn'+(i===page?' active':'')+'" data-page="'+i+'">'+i+'</button>';
}
if(endP<totalPages-1)html+='<span class="page-btn" style="border:none;cursor:default">...</span>';
if(endP<totalPages)html+='<button class="page-btn" data-page="'+totalPages+'">'+totalPages+'</button>';
html+='<button class="page-btn"'+(page>=totalPages?' disabled':'')+' data-page="next">下一页</button>';
document.getElementById('pagination').innerHTML=html;
document.querySelectorAll('[data-page]').forEach(el=>{
el.addEventListener('click',function(){
const v=this.dataset.page;
if(v==='prev')page=Math.max(1,page-1);
else if(v==='next')page=Math.min(totalPages,page+1);
else page=parseInt(v);
renderPapers();
window.scrollTo({top:document.querySelector('.filters').offsetTop-60,behavior:'smooth'});
});
});
}

/* All render */
function renderAll(){renderStats();renderChart();renderFilters();renderPapers()}

/* Search debounce */
let searchTimer;
document.getElementById('searchInput').addEventListener('input',function(){
clearTimeout(searchTimer);
searchTimer=setTimeout(()=>{searchQuery=this.value;page=1;renderAll()},200);
});

/* Sort */
const sortModes=[{key:'year-desc',label:'按年份 ↓'},{key:'year-asc',label:'按年份 ↑'},{key:'title-asc',label:'按标题 A-Z'},{key:'title-desc',label:'按标题 Z-A'}];
document.getElementById('sortBtn').addEventListener('click',function(){
const idx=sortModes.findIndex(s=>s.key===sortMode);
sortMode=sortModes[(idx+1)%sortModes.length].key;
this.textContent=sortModes[(idx+1)%sortModes.length].label;
page=1;renderPapers();
});

/* Theme */
const saved=localStorage.getItem('theme');
if(saved){document.documentElement.dataset.theme=saved;document.getElementById('themeToggle').textContent=saved==='dark'?'🌙':'☀'}
document.getElementById('themeToggle').addEventListener('click',function(){
const next=document.documentElement.dataset.theme==='dark'?'light':'dark';
document.documentElement.dataset.theme=next;
this.textContent=next==='dark'?'🌙':'☀';
localStorage.setItem('theme',next);
});

/* Init */
renderAll();
})();
</script>
</body>
</html>
